homeassistant:
  name: My Home
  latitude: !secret latitude_coord
  longitude: !secret longitude_coord
  elevation: 5
  unit_system: metric
  time_zone: Europe/Moscow
# Customization file
#   customize: !include customize.yaml
  customize: !include_dir_merge_named includes/customize
  packages: !include_dir_merge_named includes/packages
  
# Loads default set of integrations. Do not remove.
#default_config:
  allowlist_external_dirs :
   - /config #/www

config:
#Сканирование доступных устройств в сети
ssdp:
# Включение официального интерфейса
frontend:
  themes: !include_dir_merge_named themes
  
  extra_module_url:
    - /hacsfiles/custom-brand-icons/custom-brand-icons.js
    - /hacsfiles/lovelace-card-mod/card-mod.js
# Включение карты
#map:
# Включение поддержки приложения
mobile_app:
# Отслеживание солнца
sun:
# API для предоставления информации о системе и ее компонентах
system_health:
# Сенсор для отображения последней версии НА
#updater: #выпадает в ошибку
# Stream from camera
stream:
history:

alarm_control_panel:
  - platform: manual
    name: Home Alarm
    code: !secret alarm_code
#    pending_time: 20
#    delay_time: 20
#    trigger_time: 4
#    disarmed:
#      trigger_time: 0
#    armed_home:
#      pending_time: 0
#      delay_time: 0
#    disarm_after_trigger: false
    

# Reverse Proxy
http:
  use_x_forwarded_for: true
  trusted_proxies:
  - 172.19.0.1
  - 192.168.1.0/24
  - 172.19.0.0/24
  ip_ban_enabled: true
  login_attempts_threshold: 5
#  api_password: !secret http_api_password
  
panel_iframe:
  configurator:
    title: Configurator
    icon: mdi:wrench
    url: http://192.168.1.100:3218
    require_admin: true
  duplicati:
    title: "Duplicati"
    icon: mdi:backup-restore
    url: http://192.168.1.100:8201
    require_admin: true


# Медиа контент
#media_source:

lovelace:
  mode: yaml
  resources:
    - url: /hacsfiles/mini-media-player/mini-media-player-bundle.js #
      type: module
    - url: /hacsfiles/ha-yandex-icons/yandex-icons.js
      type: module
    - url: /hacsfiles/mini-graph-card/mini-graph-card-bundle.js
      type: module
    - url: /hacsfiles/stack-in-card/stack-in-card.js #
      type: module
    - url: /hacsfiles/mini-humidifier/mini-humidifier-bundle.js
      type: module
    - url: /hacsfiles/air-visual-card/air-visual-card.js
      type: module
    - url: /hacsfiles/lovelace-multiple-entity-row/multiple-entity-row.js #
      type: module
    - url: /hacsfiles/lovelace-auto-entities/auto-entities.js #
      type: module
    - url: /hacsfiles/battery-state-card/battery-state-card.js #
      type: module
    - url: /hacsfiles/history-explorer-card/history-explorer-card.js #
      type: module 
    - url: /hacsfiles/weather-card/weather-card.js
      type: module
    - url: /hacsfiles/lovelace-mushroom/mushroom.js
      type: module
    - url: /hacsfiles/logbook-card/logbook-card.js
      type: module
#    - url: /hacsfiles/lovelace-card-mod/card-mod.js
#      type: module
#    - url: /hacsfiles/custom-brand-icons/custom-brand-icons.js
#      type: module
#    - url: /hacsfiles/vertical-stack-in-card/vertical-stack-in-card.js
#      type: js
#    - url: /hacsfiles/entity-attributes-card/entity-attributes-card.js
#      type: module 
#    - url:  /hacsfiles/vacuum-card/vacuum-card.js
#      type: module 
#    - url: /hacsfiles/light-entity-card/light-entity-card.js
#      type: module
#    - url: /hacsfiles/ha-sankey-chart/ha-sankey-chart.js
#      type: module      

  dashboards:
    lovelace-graph:
      mode: yaml
      filename: ui_graph.yaml
      title: Графики
      icon: mdi:chart-bell-curve-cumulative
      show_in_sidebar: true
      require_admin: true


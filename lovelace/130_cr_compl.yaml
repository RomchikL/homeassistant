##################   Corridor
title: Коридор
icon: phu:rooms-other
cards:

############################ Колонка 1 ############################

    - type: vertical-stack
      cards:
      
        - type: markdown
          style: |
              ha-card {
                font-size: 26px;
              }          
          content: >
             **Видеонаблюдение**

        - type: custom:stack-in-card
          mode: vertical
          cards:
            - type: picture-glance
              title: Камера
              show_name: false
              entities:
#               - entity: switch.laxi_mini7s_an_kai_v300_8m_motion_alarm
#               - entity: switch.laxi_mini7s_an_kai_v300_8m_sound_detection
               - entity: input_button.laxi_mini7s
                 tap_action:
                    action: call-service
                    service: input_button.press
                    service_data:
                      entity_id: input_button.laxi_mini7s
              camera_image: camera.laxicam_mini7s
              camera_view: live
#            - type: entities
#              show_header_toggle: false
#              entities:
#                # - entity: sensor.reolink_411_ws_last_event
#                #   name: Последнее событие
#                - entity: switch.0x00158d0003f46bb6_l2


############################ Колонка 2 ############################

    - type: vertical-stack
      cards:
      
        - type: markdown
          style: |
              ha-card {
                color: #f8ffd8;
                --paper-item-icon-color: #f8ffd8;
                --paper-item-icon-active-color: #f8ffd8;
                font-weight: bold;
                font-size: 26px;
              }          
          content: >
             **Прихожая**
                 
        - type: custom:stack-in-card
          mode: vertical
          cards:  
            - type: markdown
              style: |
                   ha-card {
                     color: #f8ffd8;
                     --paper-item-icon-color: #f8ffd8;
                     --paper-item-icon-active-color: #f8ffd8;
                     font-weight: bold;
                     font-size: 14px;
                   } 
              content: >
                 **Датчики и сенсоры**
            - type: horizontal-stack
              cards:
                  
              - type: custom:mushroom-template-card
                primary: Дверь
                secondary: |-
                  {% if is_state("binary_sensor.0x00158d0008d93f0d_contact", "off") %}
                  Закрыта
                  {% else %}
                  Открыта
                  {% endif %}
                layout: horizontal
                entity: binary_sensor.0x00158d0008d93f0d_contact
                icon: |-
                  {% if is_state("binary_sensor.0x00158d0008d93f0d_contact", "off") %}
                  phu:panel-frontdoor-close
                  {% else %}
                  phu:panel-frontdoor-open
                  {% endif %}
                multiline_secondary: true
                icon_color: |-
                  {% if is_state("binary_sensor.0x00158d0008d93f0d_contact", "off") %}
                  grey
                  {% else %}
                  amber
                  {% endif %} 
                tap_action:
                  action: more-info

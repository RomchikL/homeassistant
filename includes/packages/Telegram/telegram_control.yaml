telegram_control:

    automation:
    
     ## Автоматизация управления главным меню
      - id: Главное меню управления телеграм
        alias: telegram_menu_control
        initial_state: true
        trigger:
          - platform: event
            event_type: telegram_callback
            event_data: {}
        action:
          - choose:
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/menu_hide'' }}'
                sequence:
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}' 
          - choose:
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/menu_back'' }}'
                sequence:
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: "{{ trigger.event.data.chat_id }}"
                      message: |
                        {{'\U0001F527'}} *Управление умным домом*
                        * *
                        {{'\U0001F4BB'}} *CPU* - {{ states('sensor.processor_use') }} %, {{'\U0001F321'}} - {{ states('sensor.processor_temperature') }} °C
                        {{'\U0001F6CE'}} - {{ states('alarm_control_panel.home_alarm')|replace('_', ' ') }}
                      inline_keyboard: 
                      - '{{''\U00002328''}} Телеметрия:/telemetry'
                      - '{{''\U0001F3E2''}} Гостиная:/lr_control , {{''\U0001F374''}} Кухня:/kn_control'
                      - '{{''\U0001F6B6''}} Коридор:/cr_control, {{''\U0001F6C0''}} Санузел:/bt_control'
                      - '{{''\U0001F9EA''}} Быстрые команды:/hotkeys, {{''\U0001F4A1''}} Гирлянды:/gl_control'
                      - '{{''\U0001F6AB''}} Убрать меню:/menu_hide'
  #{{'\U0001F6CE'}} - {% if is_state(''alarm_control_panel.home_alarm'', ''disarmed'')%}{{''🔴''}}{% else %}{{''🟢''}}{% endif %}                    

    ## Управление гостиной
      - id: Гостиная меню управления телеграм
        alias: telegram_lr_menu_control
        initial_state: true
        trigger: 
          - platform: event
            event_type: telegram_callback
            event_data: {}
        action:
          - choose:
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/lr_control'' }}'
                sequence:
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: &msg_lr |
                        {{'\U0001F3E2'}} Управление гостиной :
                        {{'\U0001FA9F'}} - {% if is_state('binary_sensor.0x00158d0008e1c64f_contact', 'on') %} Открыто {% else %} Закрыто {% endif %} 
                        {{'\U0001F321'}} - {{ states('sensor.0x00158d0008ce3df9_temperature') }} °C, {{'\U0001F4A7'}} - {{ states('sensor.0x00158d0008ce3df9_humidity') }} %
                      inline_keyboard: &keyb_lr
                        - '{{''\U0001F4A1''}} Лента - {% if is_state(''switch.lr_ceiling_light_lenta'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.lr_ceiling_light_lenta'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_lr_ceiling_light_lenta , {{''\U0001F4A1''}} Лампочки - {% if is_state(''switch.lr_ceiling_light_lamps'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.lr_ceiling_light_lamps'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_lr_ceiling_light_lamps'
                        - '{{''\U0001F4A1''}} Настольная - {% if is_state(''light.lamp_1s'', ''off'')%}{{''🔴''}}{% elif is_state(''light.lamp_1s'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/lr_lamp_1s_control'
                        - '{{''\U0001F4FA''}} Телевизор - {% if is_state(''media_player.lr_samsung_tv'', ''off'')%}{{''🔴''}}{% elif is_state(''media_player.lr_samsung_tv'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_lr_samsung_6_series_40, TOX - {% if is_state(''media_player.android_tv_192_168_1_150'', ''off'')%}{{''🔴''}}{% elif is_state(''media_player.android_tv_192_168_1_150'', ''undefined'') or is_state(''media_player.android_tv_192_168_1_150'', ''unknown'')%}{{''🟡''}}{% else %}{{''🟢''}}{% endif %}:/toggle_lr_tox'
                        - 'Тест (весь свет):/lr_test'
                        - '{{''\U000021A9''}} Вернуться:/menu_back , {{''\U000021AA''}} Обновить:/lr_control' 

              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/lr_test'' }}'
                sequence:              
                  - service: switch.toggle
                    entity_id: switch.lr_ceiling_light_lamps
                  - delay:
                      milliseconds: 999
                  - service: switch.toggle
                    entity_id: switch.lr_ceiling_light_lamps
                  - delay:
                      milliseconds: 999
                  - service: switch.toggle
                    entity_id: switch.lr_ceiling_light_lamps
                  - delay:
                      milliseconds: 999
                  - service: switch.toggle
                    entity_id: switch.lr_ceiling_light_lamps
                  - delay:
                      milliseconds: 999
                  - service: switch.toggle
                    entity_id: switch.lr_ceiling_light_lamps
                  - delay:
                      milliseconds: 999
                  - service: switch.toggle
                    entity_id: switch.lr_ceiling_light_lamps
                  - delay:
                      milliseconds: 999
                  - service: switch.toggle
                    entity_id: switch.lr_ceiling_light_lamps
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Тест - запустился
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_lr
                      inline_keyboard: *keyb_lr


              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_lr_ceiling_light_lenta'' }}'
                sequence:              
                  - service: switch.toggle
                    entity_id: switch.lr_ceiling_light_lenta
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Лента - {% if is_state('switch.lr_ceiling_light_lenta', 'on') %} Включена {% else %} Выключена {% endif %}
                      show_alert: false #Для особо важных - необходимо подтверждение
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_lr
                      inline_keyboard: *keyb_lr
                      
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_lr_ceiling_light_lamps'' }}'
                sequence:              
                  - service: switch.toggle
                    entity_id: switch.lr_ceiling_light_lamps
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Лампочки - {% if is_state('switch.lr_ceiling_light_lamps', 'on') %} Включены {% else %} Выключены {% endif %}
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_lr
                      inline_keyboard: *keyb_lr
                      
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_lr_lamp_1s'' }}'
                sequence:              
                  - service: light.toggle
                    entity_id: light.lamp_1s
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Настольная лампа - {% if is_state('light.lamp_1s', 'on') %} Включена {% else %} Выключена {% endif %}
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_lr
                      inline_keyboard: *keyb_lr
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_lr_tox'' }}'
                sequence:              
                  - service: media_player.toggle
                    target:
                        entity_id: media_player.android_tv_192_168_1_150
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Отправлена команда на приставку
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_lr
                      inline_keyboard: *keyb_lr
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_lr_samsung_6_series_40'' }}'
                sequence:              
                  - service: media_player.toggle
                    target:
                        entity_id: media_player.lr_samsung_tv
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Отправлена команда на телевизор
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_lr
                      inline_keyboard: *keyb_lr
                      
    ## Управление кухней
      - id: Кухня меню управления телеграм
        alias: telegram_kn_menu_control
        initial_state: true
        trigger: 
          - platform: event
            event_type: telegram_callback
            event_data: {}
        action:
          - choose:
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/kn_control'' }}'
                sequence:
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: &msg_kn |
                        {{'\U0001F374'}} Управление кухней :
                        Кухня -
                        {{'\U0001F321'}} - {{ states('sensor.0xa4c1383117449f5c_temperature') }} °C, {{'\U0001F4A7'}} - {{ states('sensor.0xa4c1383117449f5c_humidity') }} %
                        {{'\U0001F6B1'}} - Раковина - {% if is_state('binary_sensor.0x00158d0008dfa7df_water_leak', 'on') %} Протечка {% else %} Сухо {% endif %} 
                        Балкон -
                        {{'\U0001F6AA'}} - {% if is_state('binary_sensor.0xa4c1388bf2574d1e_contact', 'on') %} Открыта {% else %} Закрыта {% endif %}
                        {{'\U0001F321'}} - {{ states('sensor.0x00158d0008cafd13_temperature') }} °C, {{'\U0001F4A7'}} - {{ states('sensor.0x00158d0008cafd13_humidity') }} %
                      inline_keyboard: &keyb_kn
                        - '{{''\U0001F4A1''}} Лента - {% if is_state(''switch.light_in_kn_lenta'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.light_in_kn_lenta'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_kn_light_in_kn_lenta , {{''\U0001F4A1''}} Подсветка - {% if is_state(''switch.light_in_kn_lamps'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.light_in_kn_lamps'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_kn_light_in_kn_lamps'
                        - '{{''\U0001F4A1''}} Лампочки - {% if is_state(''switch.0xa4c138850066f7cd_left'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.0xa4c138850066f7cd_left'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_kn_ceiling_light  , {{''\U0001F4A1''}} Лента для цветов - {% if is_state(''switch.kn_led_flower'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.kn_led_flower'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_kn_led_flower'
                        - '{{''\U000021A9''}} Вернуться:/menu_back , {{''\U000021AA''}} Обновить:/kn_control' 
                        
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_kn_light_in_kn_lenta'' }}'
                sequence:              
                  - service: switch.toggle
                    entity_id: switch.light_in_kn_lenta
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Лента - {% if is_state('switch.light_in_kn_lenta', 'on') %} Включена {% else %} Выключена {% endif %}
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_kn
                      inline_keyboard: *keyb_kn
                      
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_kn_light_in_kn_lamps'' }}'
                sequence:              
                  - service: switch.toggle
                    entity_id: switch.light_in_kn_lamps
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Подсветка - {% if is_state('switch.light_in_kn_lamps', 'on') %} Включена {% else %} Выключена {% endif %}
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_kn
                      inline_keyboard: *keyb_kn

              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_kn_ceiling_light'' }}'
                sequence:              
                  - service: switch.toggle
                    entity_id: switch.0xa4c138850066f7cd_left
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Лампочки - {% if is_state('switch.0xa4c138850066f7cd_left', 'on') %} Включены {% else %} Выключены {% endif %}
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_kn
                      inline_keyboard: *keyb_kn

              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_kn_led_flower'' }}'
                sequence:              
                  - service: switch.toggle
                    entity_id: switch.kn_led_flower
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:
                      callback_query_id: "{{ trigger.event.data.id }}"
                      message: | 
                          {{"\U0001F4AC"}} Лента для цветов - {% if is_state('switch.kn_led_flower', 'on') %} Включена {% else %} Выключена {% endif %}
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_kn
                      inline_keyboard: *keyb_kn
                      
    ## Управление коридором
      - id: Коридор меню управления телеграм
        alias: telegram_cr_menu_control
        initial_state: true
        trigger: 
          - platform: event
            event_type: telegram_callback
            event_data: {}
        action:
          - choose:
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/cr_control'' }}'
                sequence:
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: &msg_cr |
                        {{'\U0001F6B6'}} Управление Коридором :
                        * *
                        {{'\U0001F6AA'}} Входная дверь - {% if is_state('binary_sensor.0x00158d0008d93f0d_contact', 'on') %} Открыта {% else %} Закрыта {% endif %}
                        {{'\U0001F6CE'}} - {{ states('alarm_control_panel.home_alarm')|replace('_', ' ') }}
                        {{'\U0001F321'}} - {{ states('sensor.0x00158d0008c12daf_temperature') }} °C, {{'\U0001F4A7'}} - {{ states('sensor.0x00158d0008c12daf_humidity') }} %
                        {{'\U0001F6B6'}} - {% if is_state('binary_sensor.0x00158d0008f1142d_occupancy', 'on') %} Движение {% else %} Нет движения {% endif %} 
                      inline_keyboard: &keyb_cr
                        - '{{''\U0001F9EA''}} Сигнализация:/toggle_cr_alarm'
                        - '{{''\U000021A9''}} Вернуться:/menu_back , {{''\U000021AA''}} Обновить:/cr_control' 

              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_cr_alarm'' }}'
                sequence:
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: alarm_control_panel.home_alarm
                            state:
                              - 'armed_home'
                              - 'armed_away'
                              - 'pending'
                        sequence:
                          - service: alarm_control_panel.alarm_disarm
                            data:
                              entity_id: alarm_control_panel.home_alarm
                              code: !secret alarm_code
                      - conditions:
                          - condition: state
                            entity_id: alarm_control_panel.home_alarm
                            state:
                              - 'disarmed'
                        sequence:
                          - service: alarm_control_panel.alarm_arm_away
                            data:
                              entity_id: alarm_control_panel.home_alarm
                              code: !secret alarm_code                          
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: *msg_cr
                      inline_keyboard: *keyb_cr
                      
    ## Управление санузел
      - id: Ванная меню управления телеграм
        alias: telegram_bt_menu_control
        initial_state: true
        trigger: 
          - platform: event
            event_type: telegram_callback
            event_data: {}
        action:
          - choose:
              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/bt_control'' }}'
                sequence:
                  - service: telegram_bot.delete_message
                    data_template:
                      message_id: '{{ trigger.event.data.message.message_id }}'
                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: &msg_bt |
                        {{'\U0001F6C0'}} Управление ванная :
                        {{'\U0001F321'}} - {{ states('sensor.0x00158d0008ce3dca_temperature') }} °C, {{'\U0001F4A7'}} - {{ states('sensor.0x00158d0008ce3dca_humidity') }} %
                        {{'\U0001F6B1'}} - Стояк - {% if is_state('binary_sensor.0x00158d0008dfa560_water_leak', 'on') %} Протечка {% else %} Сухо {% endif %} 
                        {{'\U0001F6AA'}} - {% if is_state('binary_sensor.0xa4c138dc68586d06_contact', 'on') %} Открыта {% else %} Закрыта {% endif %}
                        {{'\U0001F6B6'}} - {% if is_state('binary_sensor.0x00158d0008d90dbd_occupancy', 'on') %} Движение {% else %} Нет движения {% endif %} 
                      inline_keyboard: &keyb_bt
                        - '{{''\U0001F4A1''}} Лампочки - {% if is_state(''switch.0xa4c138850066f7cd_right'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.0xa4c138850066f7cd_right'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_bt_ceiling_light, {{''\U0001F4A1''}} Лента - {% if is_state(''switch.0xa4c1381662c81b0e'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.0xa4c1381662c81b0e'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_bt_lenta_light'
                        - '{{''\U000021A9''}} Вернуться:/menu_back , {{''\U000021AA''}} Обновить:/bt_control' 

              - conditions:
                  - condition: template
                    value_template: '{{ trigger.event.data.command == ''/toggle_bt_ceiling_light'' }}'
                sequence:              
                  - service: switch.toggle
                    entity_id: switch.0xa4c138850066f7cd_right
                  - delay:
                      milliseconds: 500
                  - service: telegram_bot.answer_callback_query
                    data:

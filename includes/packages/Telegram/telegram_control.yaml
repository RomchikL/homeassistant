                      chat_id: '{{ trigger.event.data.chat_id }}'
                  - service: telegram_bot.send_message
                    data:
                      target: '{{ trigger.event.data.chat_id }}'
                      message: &msg_gl |
                        {{'\U0001F4A1'}} Управление гирляндами
                      inline_keyboard: &keyb_gl
                        - '{{''\U0001F4A1''}} Фонарики - {% if is_state(''switch.lr_belaya'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.lr_belaya'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_gl_belaya , {{''\U0001F4A1''}} Ёлочки - {% if is_state(''switch.kn_fir'', ''off'')%}{{''🔴''}}{% elif is_state(''switch.kn_fir'', ''on'')%}{{''🟢''}}{% else %}{{''🟡''}}{% endif %}:/toggle_gl_fir'
                        - '{{''\U000021A9''}} Вернуться:/menu_back , {{''\U000021AA''}} Обновить:/gl_control' 
                        

kn_switch:

    recorder:
      include:
        entities:
           - switch.0xa4c1386f409b4ac4 # розетка цветы фиолетовая
           - switch.0xa4c13849ef842ae5 # розетка цветы подсветка
           - switch.0xa4c138323f769290 # розетка елочки
           - switch.0xa4c138e5e488903a # розетка Холодос
           - switch.0xa4c138850066f7cd_left

    sensor:
    
      - platform: integration
        name: '0xa4c138323f769290_integration'
        source: sensor.0xa4c138323f769290_power
        unit_prefix: k
        round: 2
        
      - platform: integration
        name: '0xa4c138e5e488903a_integration'
        source: sensor.0xa4c138e5e488903a_power
        unit_prefix: k
        round: 2
        
    utility_meter:

      0xa4c138323f769290_meter:
        source: sensor.0xa4c138323f769290_integration
        cycle: monthly 
        tariffs:
          - day
          - night    
          
      0xa4c138e5e488903a_meter:
        source: sensor.0xa4c138e5e488903a_integration
        cycle: monthly 
        tariffs:
          - day
          - night 

    homeassistant:
        customize:
            switch.0xa4c1386f409b4ac4:
                friendly_name: Лента для цветов
                device_class: light  
                icon: mdi:flower
                
            switch.0xa4c13849ef842ae5:
                friendly_name: Подсветка для цветов
                device_class: light  
                icon: mdi:flower
                
            switch.0xa4c138323f769290:
                friendly_name: Ёлочки
                icon: phu:christmas-lights

            switch.0xa4c138e5e488903a:
                friendly_name: Холодильник
                icon: mdi:fridge                

            automation.kn_socket_refrigerator_control:
                friendly_name: Кухня - контроль розетки холодильника
                icon: mdi:fridge

            automation.kn_led_flowers_on_morning:
                friendly_name: Кухня - включение ленты для цветов утром
                icon: phu:light-strip
            automation.kn_led_flowers_off_morning:
                friendly_name: Кухня - выключение ленты для цветов утром
                icon: phu:lightstrip-off
            automation.kn_led_flowers_on_evening:
                friendly_name: Кухня - включение ленты для цветов вечером
                icon: phu:light-strip
            automation.kn_led_flowers_off_evening:
                friendly_name: Кухня - выключение ленты для цветов вечером
                icon: phu:lightstrip-off

 
 
    automation:
    
      - alias: kn_socket_refrigerator_control
        description: Кухня - контроль розетки холодильника
        initial_state: true
        trigger:
          - platform: state
            entity_id: switch.0xa4c138e5e488903a
#            from: 'on'
#            to: 'off'
            for: "00:01:00"
        condition:
          - condition: template
            value_template: "{{ trigger.to_state.state in ['off','unknown','unavailable'] }}"          
#          - platform: state
#            entity_id: switch.0xa4c138e5e488903a
#            from: 'on'
#            to: 'unknown'
#            for: "00:01:00"
#          - platform: state
#            entity_id: switch.0xa4c138e5e488903a
#            from: 'on'
#            to: 'unavailable'
#            for: "00:01:00"
        action: 
          - service: telegram_bot.send_message
            data_template:
              target:
                - !secret chat_id_romchik
              message: | 
                Внимание!
                Розетка холодильника выключена или недоступна!

      - alias: kn_led_flowers_on_morning
        description: Кухня - включение ленты для цветов утром
        initial_state: true
        trigger:
    # Утром в 6:00
        - platform: time
          at: '06:00:00'
        condition:
    # Если выключена
        - condition: device
          type: is_off
          entity_id: switch.0xa4c1386f409b4ac4
          domain: switch
        action:
        - type: turn_on
          entity_id: switch.0xa4c1386f409b4ac4
          domain: switch
        mode: single
        
      - alias: kn_led_flowers_off_morning
        description: Кухня - выключение ленты для цветов утром
        initial_state: true
        trigger:
        - platform: sun
          # Possible values: sunset, sunrise
          event: sunrise
          # Optional time offset. This example will trigger 45 minutes before sunset.
          #offset: "-00:45:00"
    # Утром в 8:30
#        - platform: time
#          at: '08:30:00'
        condition:
    # Если выключена
        - condition: device
          type: is_on
          entity_id: switch.0xa4c1386f409b4ac4
          domain: switch
        action:
        - type: turn_off
          entity_id: switch.0xa4c1386f409b4ac4
          domain: switch
        mode: single
        
      - alias: kn_led_flowers_on_evening
        description: Кухня - включение ленты для цветов вечером
        initial_state: true
        trigger:
        - platform: sun
          # Possible values: sunset, sunrise
          event: sunset
          # Optional time offset. This example will trigger 45 minutes before sunset.
          #offset: "-00:45:00"
    # Вечером в 19:30
#        - platform: time
#          at: '19:30:00'
        condition:
    # Если включена
        - condition: device
          type: is_off
          entity_id: switch.0xa4c1386f409b4ac4
          domain: switch
        action:
        - type: turn_on
          entity_id: switch.0xa4c1386f409b4ac4
          domain: switch
        mode: single
        
      - alias: kn_led_flowers_off_evening
        description: Кухня - выключение ленты для цветов вечером
        initial_state: true
        trigger:
    # Вечером в 23:00
        - platform: time
          at: '23:00:00'
        condition:
    # Если включена
        - condition: device
          type: is_on
          entity_id: switch.0xa4c1386f409b4ac4
          domain: switch
        action:
        - type: turn_off
          entity_id: switch.0xa4c1386f409b4ac4
          domain: switch
        mode: single
        